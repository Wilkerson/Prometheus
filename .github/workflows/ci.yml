name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/prometheus
  PYTHON_VERSION: "3.12"

jobs:
  # ==========================================
  # Job 1: Testes
  # ==========================================
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: prometheus
          POSTGRES_PASSWORD: prometheus
          POSTGRES_DB: test_prometheus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prometheus"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: prometheus.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DB_NAME: test_prometheus
      DB_USER: prometheus
      DB_PASSWORD: prometheus
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Validar Django
        run: python manage.py check

      - name: Rodar testes
        run: python manage.py test apps --verbosity=2

  # ==========================================
  # Job 2: Build e push da imagem Docker
  # ==========================================
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
