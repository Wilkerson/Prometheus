{% extends "base.html" %}
{% block title %}Editar {{ plano.nome }}{% endblock %}
{% block page_title %}Editar Plano{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="card" x-data="{
    itens: [
      {% for item in plano.itens.all %}
      { produto_id: '{{ item.produto_id }}', preco: '{{ item.preco }}' }{% if not forloop.last %},{% endif %}
      {% empty %}
      { produto_id: '', preco: '' }
      {% endfor %}
    ],
    addItem() { this.itens.push({ produto_id: '', preco: '' }); },
    removeItem(i) { if (this.itens.length > 1) this.itens.splice(i, 1); }
  }">
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="label">Nome do plano <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" value="{{ plano.nome }}">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Parceiro</label>
            <select name="parceiro" required class="input">
              {% for p in parceiros %}
              <option value="{{ p.id }}" {% if plano.parceiro_id == p.id %}selected{% endif %}>{{ p.nome_entidade }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Status</label>
            <label class="flex items-center gap-2 mt-2 cursor-pointer">
              <input type="checkbox" name="ativo" {% if plano.ativo %}checked{% endif %}
                     class="w-4 h-4 rounded border-bdr text-primary-600">
              <span class="text-sm text-t2">Ativo</span>
            </label>
          </div>
        </div>

        <div>
          <label class="label">Produtos e precos <span class="text-red-500">*</span></label>
          <template x-for="(item, index) in itens" :key="index">
            <div class="flex gap-2 mb-2 items-center">
              <select :name="'produto_id'" x-model="item.produto_id" required class="input flex-1">
                <option value="">Produto...</option>
                {% for prod in produtos %}
                <option value="{{ prod.id }}">{{ prod.nome }} ({{ prod.get_tier_display }})</option>
                {% endfor %}
              </select>
              <input type="text" :name="'preco'" x-model="item.preco" required class="input w-32" placeholder="R$ Preco">
              <button type="button" @click="removeItem(index)" class="text-red-400 hover:text-red-300 text-lg px-2"
                      x-show="itens.length > 1">&times;</button>
            </div>
          </template>
          <button type="button" @click="addItem()" class="text-[12px] text-ruch-accent hover:text-t1 mt-1">
            + Adicionar produto
          </button>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Salvar</button>
        <a href="{% url 'web:plano-detail' plano.pk %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
