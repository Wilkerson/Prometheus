{% extends "base.html" %}

{% block title %}Usuarios{% endblock %}
{% block page_title %}Usuarios{% endblock %}

{% block page_actions %}
{% if can_add %}
<a href="{% url 'web:usuario-create' %}" class="btn-primary">+ Novo Usuario</a>
{% endif %}
{% endblock %}

{% block content %}
<div class="card mb-6">
  <div class="flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[200px]">
      <label class="label">Buscar</label>
      <input type="text" name="q" value="{{ current_search }}" placeholder="Nome, username ou email..."
             class="input"
             hx-get="{% url 'web:usuarios' %}"
             hx-target="#usuarios-table"
             hx-trigger="input changed delay:300ms"
             hx-include="[name='perfil']"
             hx-push-url="true">
    </div>
    <div>
      <label class="label">Perfil</label>
      <select name="perfil" class="input"
              hx-get="{% url 'web:usuarios' %}"
              hx-target="#usuarios-table"
              hx-include="[name='q']"
              hx-push-url="true">
        <option value="">Todos</option>
        {% for value, label in perfil_choices %}
        <option value="{{ value }}" {% if current_perfil == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>

<div class="card" id="usuarios-table">
  {% include "usuarios/_table.html" %}
</div>
{% endblock %}
