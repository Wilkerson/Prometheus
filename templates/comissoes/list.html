{% extends "base.html" %}

{% block title %}Comissões{% endblock %}
{% block page_title %}Comissões{% endblock %}

{% block content %}
<div class="card mb-6">
  <div class="flex gap-3">
    <div>
      <label class="label">Status</label>
      <select name="status" class="input"
              hx-get="{% url 'web:comissoes' %}"
              hx-target="#comissoes-table"
              hx-push-url="true">
        <option value="">Todas</option>
        {% for value, label in status_choices %}
        <option value="{{ value }}" {% if current_status == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>

<div class="card" id="comissoes-table">
  {% include "comissoes/_table.html" %}
</div>
{% endblock %}
