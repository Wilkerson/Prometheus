{% extends "base.html" %}
{% block title %}Editar {{ produto.nome }}{% endblock %}
{% block page_title %}Editar Produto{% endblock %}
{% block page_actions %}<a href="{% url 'web:produtos' %}" class="btn-secondary">Voltar</a>{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="label">Nome <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" value="{{ produto.nome }}">
        </div>
        <div>
          <label class="label">Descrição <span class="text-red-500">*</span></label>
          <textarea name="descricao" rows="3" required class="input">{{ produto.descricao }}</textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Tier</label>
            <select name="tier" class="input">
              {% for v, l in tier_choices %}
              <option value="{{ v }}" {% if produto.tier == v %}selected{% endif %}>{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Status</label>
            <label class="flex items-center gap-2 mt-2 cursor-pointer">
              <input type="checkbox" name="ativo" {% if produto.ativo %}checked{% endif %}
                     class="w-4 h-4 rounded border-bdr text-primary-600">
              <span class="text-sm text-t2">Ativo</span>
            </label>
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Salvar</button>
        <a href="{% url 'web:produtos' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
