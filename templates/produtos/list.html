{% extends "base.html" %}
{% block title %}Produtos{% endblock %}
{% block page_title %}Produtos{% endblock %}
{% block page_actions %}
{% if can_add %}<a href="{% url 'web:produto-create' %}" class="btn-primary">+ Novo Produto</a>{% endif %}
{% endblock %}
{% block content %}
<div class="card mb-4">
  <div class="flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[200px]">
      <label class="label">Buscar</label>
      <input type="text" name="q" placeholder="Nome do produto..." class="input"
             hx-get="{% url 'web:produtos' %}" hx-target="#table" hx-trigger="input changed delay:300ms"
             hx-include="[name='tier']" hx-push-url="true">
    </div>
    <div>
      <label class="label">Tier</label>
      <select name="tier" class="input"
              hx-get="{% url 'web:produtos' %}" hx-target="#table" hx-include="[name='q']" hx-push-url="true">
        <option value="">Todos</option>
        {% for v, l in tier_choices %}
        <option value="{{ v }}" {% if current_tier == v %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>
<div class="card" id="table">{% include "produtos/_table.html" %}</div>
{% endblock %}
