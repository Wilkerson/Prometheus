{% if produtos %}
<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-bdr text-left text-t3">
        <th class="pb-3 font-medium">Nome</th>
        <th class="pb-3 font-medium">Tier</th>
        <th class="pb-3 font-medium">Status</th>
        <th class="pb-3 font-medium">Acoes</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-bdr">
      {% for produto in produtos %}
      <tr class="hover:bg-bg3">
        <td class="py-3 font-medium text-t1">{{ produto.nome }}</td>
        <td class="py-3 text-t2">{{ produto.get_tier_display }}</td>
        <td class="py-3">
          {% if produto.ativo %}
          <span class="badge bg-emerald-500/15 text-emerald-500">Ativo</span>
          {% else %}
          <span class="badge bg-bg4 text-t3">Inativo</span>
          {% endif %}
        </td>
        <td class="py-3">
          <a href="{% url 'web:produto-edit' produto.pk %}" class="text-[12px] text-ruch-accent hover:text-t1 no-underline">Editar</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-sm text-t3 py-4">Nenhum produto cadastrado.</p>
{% endif %}
