{% extends "base.html" %}
{% block title %}Nova Pesquisa eNPS{% endblock %}
{% block page_title %}Nova Pesquisa eNPS{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="card">
    <form method="post" x-data="{ perguntas: [
      { texto: 'Em uma escala de 0 a 10, o quanto voce recomendaria a RUCH como um bom lugar para trabalhar?', tipo: 'enps' },
      { texto: 'Voce se sente reconhecido pelo seu trabalho?', tipo: 'escala' },
      { texto: 'Voce tem clareza sobre suas metas e responsabilidades?', tipo: 'escala' },
      { texto: 'O que a RUCH poderia melhorar para voce?', tipo: 'aberta' }
    ] }">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Titulo <span class="text-red-500">*</span></label>
          <input type="text" name="titulo" required class="input" placeholder="Ex: eNPS 1T 2026">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Data inicio <span class="text-red-500">*</span></label>
            <input type="date" name="data_inicio" required class="input">
          </div>
          <div>
            <label class="label">Data encerramento <span class="text-red-500">*</span></label>
            <input type="date" name="data_encerramento" required class="input">
          </div>
        </div>
        <div>
          <label class="label">Descrição</label>
          <textarea name="descricao" rows="2" class="input"></textarea>
        </div>
      </div>

      <h3 class="text-sm font-semibold text-t2 mb-3 mt-6 pt-4 border-t border-bdr">Perguntas</h3>
      <div class="space-y-2">
        <template x-for="(p, index) in perguntas" :key="index">
          <div class="flex gap-2 items-start">
            <select :name="'pergunta_tipo'" class="input w-28 flex-shrink-0" x-model="p.tipo">
              {% for v, l in tipo_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
            <input type="text" :name="'pergunta_texto'" class="input flex-1" x-model="p.texto">
            <button type="button" @click="perguntas.splice(index, 1)" class="text-red-400 hover:text-red-300 text-lg px-2" x-show="perguntas.length > 1">&times;</button>
          </div>
        </template>
      </div>
      <button type="button" @click="perguntas.push({ texto: '', tipo: 'escala' })"
              class="text-[12px] text-ruch-accent hover:text-t1 mt-2">+ Adicionar pergunta</button>

      <div class="flex gap-3 mt-6 pt-4 border-t border-bdr">
        <button type="submit" class="btn-primary">Cadastrar Pesquisa</button>
        <a href="{% url 'web:rh-enps' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
