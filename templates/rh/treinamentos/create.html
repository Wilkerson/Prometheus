{% extends "base.html" %}
{% block title %}Novo Treinamento{% endblock %}
{% block page_title %}Novo Treinamento{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Nome <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" value="{{ dados.nome|default:'' }}">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Tipo <span class="text-red-500">*</span></label>
            <select name="tipo" required class="input">
              <option value="">Selecione...</option>
              {% for v, l in tipo_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Modalidade</label>
            <select name="modalidade" class="input">
              {% for v, l in modalidade_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Carga horaria (h)</label>
            <input type="number" name="carga_horaria" class="input" value="1" min="1">
          </div>
          <div>
            <label class="label">Instituicao / Plataforma</label>
            <input type="text" name="instituicao" class="input" value="{{ dados.instituicao|default:'' }}">
          </div>
        </div>
        <div>
          <label class="label">Descrição</label>
          <textarea name="descricao" rows="3" class="input">{{ dados.descricao|default:'' }}</textarea>
        </div>
        <div>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="obrigatorio" class="w-4 h-4 rounded border-bdr text-ruch-green">
            <span class="text-sm text-t2">Treinamento obrigatorio</span>
          </label>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar</button>
        <a href="{% url 'web:rh-treinamentos' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
