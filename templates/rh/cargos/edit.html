{% extends "base.html" %}
{% block title %}Editar {{ cargo.nome }}{% endblock %}
{% block page_title %}Editar Cargo{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4">
        <div>
          <label class="label">Nome do cargo <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" value="{{ cargo.nome }}">
        </div>
        <div>
          <label class="label">Departamento <span class="text-red-500">*</span></label>
          <select name="departamento" required class="input">
            <option value="">Selecione...</option>
            {% for d in departamentos %}
            <option value="{{ d.pk }}" {% if cargo.departamento_id == d.pk %}selected{% endif %}>{{ d.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label">Nivel hierarquico</label>
          <select name="nivel" class="input">
            {% for v, l in nivel_choices %}
            <option value="{{ v }}" {% if cargo.nivel == v %}selected{% endif %}>{{ l }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="label">Faixa salarial min (R$)</label>
            <input type="number" step="0.01" name="faixa_salarial_min" class="input" value="{{ cargo.faixa_salarial_min|default:'' }}">
          </div>
          <div>
            <label class="label">Faixa salarial max (R$)</label>
            <input type="number" step="0.01" name="faixa_salarial_max" class="input" value="{{ cargo.faixa_salarial_max|default:'' }}">
          </div>
        </div>
        <div>
          <label class="label">Descrição de responsabilidades</label>
          <textarea name="descricao" rows="3" class="input">{{ cargo.descricao }}</textarea>
        </div>
        <div>
          <label class="label">Requisitos minimos</label>
          <textarea name="requisitos" rows="2" class="input">{{ cargo.requisitos }}</textarea>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="label">Status</label>
            <label class="flex items-center gap-2 mt-2 cursor-pointer">
              <input type="checkbox" name="ativo" {% if cargo.ativo %}checked{% endif %}
                     class="w-4 h-4 rounded border-bdr text-primary-600">
              <span class="text-sm text-t2">Ativo</span>
            </label>
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Salvar</button>
        <a href="{% url 'web:rh-cargo-detail' cargo.pk %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
