{% if setores %}
<div class="overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="border-b border-bdr text-left text-t3">
        <th class="pb-3 font-medium">Setor</th>
        <th class="pb-3 font-medium">Departamento</th>
        <th class="pb-3 font-medium">Status</th>
        <th class="pb-3 font-medium">Acoes</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-bdr">
      {% for setor in setores %}
      <tr class="hover:bg-bg3">
        <td class="py-3 font-medium text-t1">{{ setor.nome }}</td>
        <td class="py-3 text-t2">{{ setor.departamento.nome }}</td>
        <td class="py-3 whitespace-nowrap">
          {% if setor.ativo %}
          <span class="badge bg-emerald-500/15 text-emerald-500">Ativo</span>
          {% else %}
          <span class="badge bg-bg4 text-t3">Inativo</span>
          {% endif %}
        </td>
        <td class="py-3 whitespace-nowrap">
          <a href="{% url 'web:rh-setor-edit' setor.pk %}" class="text-[12px] text-ruch-accent hover:text-t1 no-underline">Editar</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-sm text-t3 py-4">Nenhum setor cadastrado.</p>
{% endif %}
