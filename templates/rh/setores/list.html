{% extends "base.html" %}
{% block title %}Setores{% endblock %}
{% block page_title %}Setores{% endblock %}
{% block page_actions %}
{% if can_add %}<a href="{% url 'web:rh-setor-create' %}" class="btn-primary">+ Novo Setor</a>{% endif %}
{% endblock %}
{% block content %}
<div class="card mb-4">
  <div class="flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[200px]">
      <label class="label">Buscar</label>
      <input type="text" name="q" placeholder="Nome do setor..." class="input"
             hx-get="{% url 'web:rh-setores' %}" hx-target="#table" hx-trigger="input changed delay:300ms"
             hx-include="[name='departamento']" hx-push-url="true">
    </div>
    <div>
      <label class="label">Departamento</label>
      <select name="departamento" class="input"
              hx-get="{% url 'web:rh-setores' %}" hx-target="#table" hx-include="[name='q']" hx-push-url="true">
        <option value="">Todos</option>
        {% for d in departamentos %}
        <option value="{{ d.pk }}" {% if current_depto == d.pk|stringformat:"d" %}selected{% endif %}>{{ d.nome }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>
<div class="card" id="table">{% include "rh/setores/_table.html" %}</div>
{% endblock %}
