{% extends "base.html" %}
{% block title %}Novo Setor{% endblock %}
{% block page_title %}Novo Setor{% endblock %}
{% block page_actions %}<a href="{% url 'web:rh-setores' %}" class="btn-secondary">Voltar</a>{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Nome do setor <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" value="{{ dados.nome|default:'' }}">
        </div>
        <div>
          <label class="label">Departamento <span class="text-red-500">*</span></label>
          <select name="departamento" required class="input">
            <option value="">Selecione...</option>
            {% for d in departamentos %}
            <option value="{{ d.pk }}" {% if dados.departamento == d.pk|stringformat:"d" %}selected{% endif %}>{{ d.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label">Descricao</label>
          <textarea name="descricao" rows="3" class="input">{{ dados.descricao|default:'' }}</textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar</button>
        <a href="{% url 'web:rh-setores' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
