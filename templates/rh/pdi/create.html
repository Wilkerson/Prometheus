{% extends "base.html" %}
{% block title %}Novo PDI{% endblock %}
{% block page_title %}Novo PDI{% endblock %}
{% block page_actions %}<a href="{% url 'web:rh-pdis' %}" class="btn-secondary">Voltar</a>{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Colaborador <span class="text-red-500">*</span></label>
          <select name="colaborador" required class="input">
            <option value="">Selecione...</option>
            {% for c in colaboradores %}
            <option value="{{ c.pk }}">{{ c.nome_completo }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="col-span-2">
            <label class="label">Competência / Área <span class="text-red-500">*</span></label>
            <input type="text" name="competencia" required class="input" placeholder="Ex: Gestao de projetos">
          </div>
          <div>
            <label class="label">Ano <span class="text-red-500">*</span></label>
            <input type="number" name="ano" required class="input" value="{% now 'Y' %}">
          </div>
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar PDI</button>
        <a href="{% url 'web:rh-pdis' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
