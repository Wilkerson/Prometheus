{% extends "base.html" %}
{% block title %}Novo Documento{% endblock %}
{% block page_title %}Novo Documento{% endblock %}
{% block page_actions %}<a href="{% url 'web:rh-documentos' %}" class="btn-secondary">Voltar</a>{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Colaborador <span class="text-red-500">*</span></label>
          <select name="colaborador" required class="input">
            <option value="">Selecione...</option>
            {% for c in colaboradores %}
            <option value="{{ c.pk }}" {% if colab_id == c.pk %}selected{% endif %}>{{ c.nome_completo }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Tipo <span class="text-red-500">*</span></label>
            <select name="tipo" required class="input">
              <option value="">Selecione...</option>
              {% for v, l in tipo_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Nome / Descricao <span class="text-red-500">*</span></label>
            <input type="text" name="nome" required class="input" placeholder="Ex: Contrato de trabalho 2026">
          </div>
        </div>
        <div>
          <label class="label">Arquivo <span class="text-red-500">*</span></label>
          <input type="file" name="arquivo" required
                 class="block w-full text-sm text-t2 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-bg4 file:text-t2 hover:file:bg-bdr2">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Data de emissao</label>
            <input type="date" name="data_emissao" class="input">
          </div>
          <div>
            <label class="label">Data de vencimento</label>
            <input type="date" name="data_vencimento" class="input">
          </div>
        </div>
        <div>
          <label class="label">Alertar quantos dias antes do vencimento</label>
          <input type="number" name="alerta_dias_antes" class="input" value="30" min="1">
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Enviar Documento</button>
        <a href="{% url 'web:rh-documentos' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
