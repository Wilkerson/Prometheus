{% extends "base.html" %}
{% block title %}Colaboradores{% endblock %}
{% block page_title %}Colaboradores{% endblock %}
{% block page_actions %}
{% if can_add %}<a href="{% url 'web:rh-colaborador-create' %}" class="btn-primary">+ Novo Colaborador</a>{% endif %}
{% endblock %}
{% block content %}
<div class="card mb-4">
  <div class="flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[200px]">
      <label class="label">Buscar</label>
      <input type="text" name="q" placeholder="Nome, CPF ou e-mail..." class="input"
             hx-get="{% url 'web:rh-colaboradores' %}" hx-target="#table" hx-trigger="input changed delay:300ms"
             hx-include="[name='status'],[name='tipo'],[name='departamento']" hx-push-url="true">
    </div>
    <div>
      <label class="label">Status</label>
      <select name="status" class="input"
              hx-get="{% url 'web:rh-colaboradores' %}" hx-target="#table" hx-include="[name='q'],[name='tipo'],[name='departamento']" hx-push-url="true">
        <option value="">Todos</option>
        {% for v, l in status_choices %}
        <option value="{{ v }}" {% if current_status == v %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label">Contrato</label>
      <select name="tipo" class="input"
              hx-get="{% url 'web:rh-colaboradores' %}" hx-target="#table" hx-include="[name='q'],[name='status'],[name='departamento']" hx-push-url="true">
        <option value="">Todos</option>
        {% for v, l in tipo_choices %}
        <option value="{{ v }}" {% if current_tipo == v %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label">Departamento</label>
      <select name="departamento" class="input"
              hx-get="{% url 'web:rh-colaboradores' %}" hx-target="#table" hx-include="[name='q'],[name='status'],[name='tipo']" hx-push-url="true">
        <option value="">Todos</option>
        {% for d in departamentos %}
        <option value="{{ d.pk }}" {% if current_depto == d.pk|stringformat:"d" %}selected{% endif %}>{{ d.nome }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>
<div class="card" id="table">{% include "rh/colaboradores/_table.html" %}</div>
{% endblock %}
