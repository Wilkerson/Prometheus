{% extends "base.html" %}
{% block title %}Despesas{% endblock %}
{% block page_title %}Contas a Pagar{% endblock %}
{% block page_actions %}
{% if can_add %}<a href="{% url 'web:fin-despesa-create' %}" class="btn-primary">+ Nova Despesa</a>{% endif %}
{% endblock %}
{% block content %}
<div class="card mb-4">
  <div class="flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[200px]">
      <label class="label">Buscar</label>
      <input type="text" name="q" placeholder="Descrição ou fornecedor..." class="input"
             hx-get="{% url 'web:fin-despesas' %}" hx-target="#table" hx-trigger="input changed delay:300ms"
             hx-include="[name='status']" hx-push-url="true">
    </div>
    <div>
      <label class="label">Status</label>
      <select name="status" class="input"
              hx-get="{% url 'web:fin-despesas' %}" hx-target="#table" hx-include="[name='q']" hx-push-url="true">
        <option value="">Todos</option>
        {% for v, l in status_choices %}
        <option value="{{ v }}" {% if current_status == v %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>
<div class="card" id="table">{% include "financeiro/despesas/_table.html" %}</div>
{% endblock %}
