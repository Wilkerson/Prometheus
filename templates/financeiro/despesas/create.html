{% extends "base.html" %}
{% block title %}Nova Despesa{% endblock %}
{% block page_title %}Nova Despesa{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Fornecedor / Beneficiário <span class="text-red-500">*</span></label>
          <input type="text" name="fornecedor" required class="input" placeholder="Ex: Hostgator, Contabilidade XYZ">
        </div>
        <div>
          <label class="label">Descrição <span class="text-red-500">*</span></label>
          <input type="text" name="descricao" required class="input" placeholder="Ex: Servidor VPS — abril/2026">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Categoria <span class="text-red-500">*</span></label>
            <select name="categoria" required class="input">
              <option value="">Selecione...</option>
              {% for c in categorias %}
              <option value="{{ c.pk }}">{{ c }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Recorrência</label>
            <select name="recorrencia" class="input">
              {% for v, l in recorrencia_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Valor (R$) <span class="text-red-500">*</span></label>
            <input type="number" step="0.01" name="valor" required class="input">
          </div>
          <div>
            <label class="label">Vencimento <span class="text-red-500">*</span></label>
            <input type="date" name="vencimento" required class="input">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Conta de pagamento</label>
            <select name="conta" class="input">
              <option value="">Selecione...</option>
              {% for c in contas %}
              <option value="{{ c.pk }}">{{ c.nome }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Centro de custo</label>
            <select name="departamento" class="input">
              <option value="">Nenhum</option>
              {% for d in departamentos %}
              <option value="{{ d.pk }}">{{ d.nome }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
        <div>
          <label class="label">Comprovante</label>
          <input type="file" name="comprovante"
                 class="block w-full text-sm text-t2 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-bg4 file:text-t2 hover:file:bg-bdr2">
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar</button>
        <a href="{% url 'web:fin-despesas' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
