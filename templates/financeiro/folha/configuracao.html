{% extends "base.html" %}
{% block title %}Configuração de Folha{% endblock %}
{% block page_title %}Configuração de Folha{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="label">Dia útil para pagamento</label>
          <input type="number" name="dia_pagamento" class="input" value="{{ config.dia_pagamento }}" min="1" max="30">
          <p class="text-[10px] text-t3 mt-1">Ex: 5 = pagamento no 5º dia útil de cada mês</p>
        </div>
        <div>
          <label class="label">Conta padrão para pagamentos</label>
          <select name="conta_padrao" class="input">
            <option value="">Selecione...</option>
            {% for c in contas %}
            <option value="{{ c.pk }}" {% if config.conta_padrao_id == c.pk %}selected{% endif %}>{{ c.nome }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="pt-3 border-t border-bdr">
          <label class="label mb-3">Gerar automaticamente</label>
          <div class="space-y-2">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" name="gerar_salario" {% if config.gerar_salario %}checked{% endif %}
                     class="w-4 h-4 rounded border-bdr text-ruch-green">
              <span class="text-sm text-t2">Salários CLT</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" name="gerar_pj" {% if config.gerar_pj %}checked{% endif %}
                     class="w-4 h-4 rounded border-bdr text-ruch-green">
              <span class="text-sm text-t2">Pagamentos PJ</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" name="gerar_pro_labore" {% if config.gerar_pro_labore %}checked{% endif %}
                     class="w-4 h-4 rounded border-bdr text-ruch-green">
              <span class="text-sm text-t2">Pró-labore (diretores)</span>
            </label>
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Salvar Configuração</button>
        <a href="{% url 'web:fin-folha' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
