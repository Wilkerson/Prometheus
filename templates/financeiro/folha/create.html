{% extends "base.html" %}
{% block title %}Novo Pagamento{% endblock %}
{% block page_title %}Novo Pagamento de Folha{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="label">Departamento</label>
            <select name="departamento" class="input"
                    hx-get="{% url 'web:fin-folha-colaboradores' %}"
                    hx-target="#select-colaborador"
                    hx-trigger="change"
                    hx-swap="innerHTML">
              <option value="">Todos</option>
              {% for d in departamentos %}
              <option value="{{ d.pk }}">{{ d.nome }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Colaborador <span class="text-red-500">*</span></label>
            <select name="colaborador" id="select-colaborador" required class="input">
              <option value="">Selecione...</option>
              {% for c in colaboradores %}
              <option value="{{ c.pk }}">{{ c.nome_completo }} ({{ c.get_tipo_contrato_display }} — {{ c.remuneracao|brl }})</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="label">Tipo <span class="text-red-500">*</span></label>
            <select name="tipo" required class="input">
              {% for v, l in tipo_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Competência <span class="text-red-500">*</span></label>
            <input type="month" name="competencia" required class="input">
          </div>
        </div>
        <div>
          <label class="label">Valor bruto (R$) <span class="text-red-500">*</span></label>
          <input type="number" step="0.01" name="valor_bruto" required class="input">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="label">Desconto INSS</label>
            <input type="number" step="0.01" name="desconto_inss" class="input" value="0">
          </div>
          <div>
            <label class="label">Desconto IR</label>
            <input type="number" step="0.01" name="desconto_ir" class="input" value="0">
          </div>
          <div>
            <label class="label">Outros descontos</label>
            <input type="number" step="0.01" name="outros_descontos" class="input" value="0">
          </div>
        </div>
        <div>
          <label class="label">Conta de pagamento</label>
          <select name="conta" class="input">
            <option value="">Selecione...</option>
            {% for c in contas %}
            <option value="{{ c.pk }}">{{ c.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar</button>
        <a href="{% url 'web:fin-folha' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
