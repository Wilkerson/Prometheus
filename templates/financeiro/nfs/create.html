{% extends "base.html" %}
{% block title %}Nova Nota Fiscal{% endblock %}
{% block page_title %}Nova Nota Fiscal{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card" x-data="{ tipo: 'emitida' }">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div class="flex gap-3">
          <label class="flex-1 cursor-pointer">
            <input type="radio" name="tipo" value="emitida" x-model="tipo" class="sr-only peer" checked>
            <div class="text-center py-2.5 rounded-lg border border-bdr text-sm font-medium peer-checked:bg-emerald-500/15 peer-checked:text-emerald-500 peer-checked:border-emerald-500/30 text-t3">Emitida</div>
          </label>
          <label class="flex-1 cursor-pointer">
            <input type="radio" name="tipo" value="recebida" x-model="tipo" class="sr-only peer">
            <div class="text-center py-2.5 rounded-lg border border-bdr text-sm font-medium peer-checked:bg-blue-500/15 peer-checked:text-blue-500 peer-checked:border-blue-500/30 text-t3">Recebida</div>
          </label>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="label">Número da NF <span class="text-red-500">*</span></label>
            <input type="text" name="numero" required class="input">
          </div>
          <div>
            <label class="label">Valor (R$) <span class="text-red-500">*</span></label>
            <input type="number" step="0.01" name="valor" required class="input">
          </div>
        </div>
        <div>
          <label class="label">Data de emissão <span class="text-red-500">*</span></label>
          <input type="date" name="data_emissao" required class="input">
        </div>
        <div x-show="tipo === 'emitida'">
          <label class="label">Cliente</label>
          <select name="cliente" class="input">
            <option value="">Selecione...</option>
            {% for c in clientes %}
            <option value="{{ c.pk }}">{{ c.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div x-show="tipo === 'recebida'">
          <label class="label">Fornecedor</label>
          <input type="text" name="fornecedor" class="input" placeholder="Nome do fornecedor">
        </div>
        <div>
          <label class="label">Arquivo (PDF)</label>
          <input type="file" name="arquivo" accept=".pdf"
                 class="block w-full text-sm text-t2 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-bg4 file:text-t2 hover:file:bg-bdr2">
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar NF</button>
        <a href="{% url 'web:fin-nfs' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
