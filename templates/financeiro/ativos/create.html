{% extends "base.html" %}
{% block title %}Novo Ativo{% endblock %}
{% block page_title %}Novo Ativo{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Nome do ativo <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" placeholder="Ex: MacBook Pro 14 polegadas">
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="label">Categoria <span class="text-red-500">*</span></label>
            <select name="categoria" required class="input">
              {% for v, l in categoria_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Tipo <span class="text-red-500">*</span></label>
            <input type="text" name="tipo" required class="input" placeholder="Ex: Notebook, Monitor..." list="tipos-sugestoes">
            <datalist id="tipos-sugestoes">
              {% for t in tipos_existentes %}
              <option value="{{ t }}">
              {% endfor %}
            </datalist>
          </div>
          <div>
            <label class="label">Nº de série</label>
            <input type="text" name="numero_serie" class="input">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Valor de compra (R$) <span class="text-red-500">*</span></label>
            <input type="number" step="0.01" name="valor_compra" required class="input">
          </div>
          <div>
            <label class="label">Data de aquisição <span class="text-red-500">*</span></label>
            <input type="date" name="data_aquisicao" required class="input">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Vida útil (anos)</label>
            <input type="number" name="vida_util_anos" class="input" value="5" min="1">
          </div>
          <div>
            <label class="label">Taxa depreciação anual (%)</label>
            <input type="number" step="0.01" name="taxa_depreciacao" class="input" value="20">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="label">Responsável</label>
            <input type="text" name="responsavel" class="input">
          </div>
          <div>
            <label class="label">Departamento</label>
            <select name="departamento" class="input">
              <option value="">Nenhum</option>
              {% for d in departamentos %}
              <option value="{{ d.pk }}">{{ d.nome }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Setor</label>
            <select name="setor" class="input">
              <option value="">Nenhum</option>
              {% for s in setores %}
              <option value="{{ s.pk }}">{{ s.nome }} ({{ s.departamento.nome }})</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar</button>
        <a href="{% url 'web:fin-ativos' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
