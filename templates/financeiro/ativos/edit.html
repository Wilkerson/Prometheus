{% extends "base.html" %}
{% block title %}Editar {{ ativo.nome }}{% endblock %}
{% block page_title %}Editar Ativo{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="label">Nome <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" value="{{ ativo.nome }}">
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="label">Categoria</label>
            <select name="categoria" class="input">
              {% for v, l in categoria_choices %}
              <option value="{{ v }}" {% if ativo.categoria == v %}selected{% endif %}>{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Tipo</label>
            <input type="text" name="tipo" class="input" value="{{ ativo.tipo }}" list="tipos-sugestoes">
            <datalist id="tipos-sugestoes">
              {% for t in tipos_existentes %}
              <option value="{{ t }}">
              {% endfor %}
            </datalist>
          </div>
          <div>
            <label class="label">Status</label>
            <select name="status" class="input">
              {% for v, l in status_choices %}
              <option value="{{ v }}" {% if ativo.status == v %}selected{% endif %}>{{ l }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Nº de série</label>
            <input type="text" name="numero_serie" class="input" value="{{ ativo.numero_serie }}">
          </div>
          <div>
            <label class="label">Valor compra (R$)</label>
            <input type="number" step="0.01" name="valor_compra" class="input" value="{{ ativo.valor_compra }}">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Vida útil (anos)</label>
            <input type="number" name="vida_util_anos" class="input" value="{{ ativo.vida_util_anos }}">
          </div>
          <div>
            <label class="label">Taxa depreciação (%)</label>
            <input type="number" step="0.01" name="taxa_depreciacao" class="input" value="{{ ativo.taxa_depreciacao }}">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="label">Responsável</label>
            <input type="text" name="responsavel" class="input" value="{{ ativo.responsavel }}">
          </div>
          <div>
            <label class="label">Departamento</label>
            <select name="departamento" class="input">
              <option value="">Nenhum</option>
              {% for d in departamentos %}
              <option value="{{ d.pk }}" {% if ativo.departamento_id == d.pk %}selected{% endif %}>{{ d.nome }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Setor</label>
            <select name="setor" class="input">
              <option value="">Nenhum</option>
              {% for s in setores %}
              <option value="{{ s.pk }}" {% if ativo.setor_id == s.pk %}selected{% endif %}>{{ s.nome }} ({{ s.departamento.nome }})</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input">{{ ativo.observacao }}</textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Salvar</button>
        <a href="{% url 'web:fin-ativo-detail' ativo.pk %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
