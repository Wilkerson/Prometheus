{% extends "base.html" %}
{% block title %}Nova Conta Bancaria{% endblock %}
{% block page_title %}Nova Conta Bancaria{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Nome da conta <span class="text-red-500">*</span></label>
          <input type="text" name="nome" required class="input" placeholder="Ex: Conta PJ Itau">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="label">Tipo <span class="text-red-500">*</span></label>
            <select name="tipo" required class="input">
              <option value="">Selecione...</option>
              {% for v, l in tipo_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Banco</label>
            <input type="text" name="banco" class="input" placeholder="Ex: Itau 341">
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <div>
            <label class="label">Agencia</label>
            <input type="text" name="agencia" class="input">
          </div>
          <div>
            <label class="label">Número da conta</label>
            <input type="text" name="numero" class="input">
          </div>
          <div>
            <label class="label">Saldo inicial (R$)</label>
            <input type="number" step="0.01" name="saldo_inicial" class="input" value="0">
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar</button>
        <a href="{% url 'web:fin-contas' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
