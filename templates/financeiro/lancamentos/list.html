{% extends "base.html" %}
{% block title %}Lancamentos{% endblock %}
{% block page_title %}Lancamentos{% endblock %}
{% block page_actions %}
{% if can_add %}<a href="{% url 'web:fin-lancamento-create' %}" class="btn-primary">+ Novo Lancamento</a>{% endif %}
{% endblock %}
{% block content %}
<div class="card mb-4">
  <div class="flex flex-wrap gap-3 items-end">
    <div class="flex-1 min-w-[200px]">
      <label class="label">Buscar</label>
      <input type="text" name="q" placeholder="Descricao..." class="input"
             hx-get="{% url 'web:fin-lancamentos' %}" hx-target="#table" hx-trigger="input changed delay:300ms"
             hx-include="[name='tipo'],[name='status'],[name='conta']" hx-push-url="true">
    </div>
    <div>
      <label class="label">Tipo</label>
      <select name="tipo" class="input"
              hx-get="{% url 'web:fin-lancamentos' %}" hx-target="#table" hx-include="[name='q'],[name='status'],[name='conta']" hx-push-url="true">
        <option value="">Todos</option>
        {% for v, l in tipo_choices %}
        <option value="{{ v }}" {% if current_tipo == v %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label">Status</label>
      <select name="status" class="input"
              hx-get="{% url 'web:fin-lancamentos' %}" hx-target="#table" hx-include="[name='q'],[name='tipo'],[name='conta']" hx-push-url="true">
        <option value="">Todos</option>
        {% for v, l in status_choices %}
        <option value="{{ v }}" {% if current_status == v %}selected{% endif %}>{{ l }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="label">Conta</label>
      <select name="conta" class="input"
              hx-get="{% url 'web:fin-lancamentos' %}" hx-target="#table" hx-include="[name='q'],[name='tipo'],[name='status']" hx-push-url="true">
        <option value="">Todas</option>
        {% for c in contas %}
        <option value="{{ c.pk }}" {% if current_conta == c.pk|stringformat:"d" %}selected{% endif %}>{{ c.nome }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>
<div class="card" id="table">{% include "financeiro/lancamentos/_table.html" %}</div>
{% endblock %}
