{% extends "base.html" %}
{% block title %}Novo Lancamento{% endblock %}
{% block page_title %}Novo Lancamento{% endblock %}
{% block page_actions %}<a href="{% url 'web:fin-lancamentos' %}" class="btn-secondary">Voltar</a>{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="card" x-data="{ tipo: 'despesa' }">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <!-- Tipo -->
        <div class="flex gap-3">
          <label class="flex-1 cursor-pointer">
            <input type="radio" name="tipo" value="receita" x-model="tipo" class="sr-only peer">
            <div class="text-center py-2.5 rounded-lg border border-bdr text-sm font-medium peer-checked:bg-emerald-500/15 peer-checked:text-emerald-500 peer-checked:border-emerald-500/30 text-t3">Receita</div>
          </label>
          <label class="flex-1 cursor-pointer">
            <input type="radio" name="tipo" value="despesa" x-model="tipo" class="sr-only peer" checked>
            <div class="text-center py-2.5 rounded-lg border border-bdr text-sm font-medium peer-checked:bg-red-500/15 peer-checked:text-red-400 peer-checked:border-red-500/30 text-t3">Despesa</div>
          </label>
        </div>

        <div>
          <label class="label">Descricao <span class="text-red-500">*</span></label>
          <input type="text" name="descricao" required class="input" placeholder="Ex: Mensalidade Plano Premium - Cliente X">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Valor bruto (R$) <span class="text-red-500">*</span></label>
            <input type="number" step="0.01" name="valor" required class="input" placeholder="0.00">
          </div>
          <div>
            <label class="label">Valor liquido (R$) <span class="text-xs text-t3 font-normal">opcional</span></label>
            <input type="number" step="0.01" name="valor_liquido" class="input" placeholder="Apos taxas">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Categoria <span class="text-red-500">*</span></label>
            <select name="categoria" required class="input">
              <option value="">Selecione...</option>
              <template x-if="tipo === 'receita'">
                <optgroup label="Receitas">
                  {% for c in receita_cats %}
                  <option value="{{ c.pk }}">{{ c }}</option>
                  {% endfor %}
                </optgroup>
              </template>
              <template x-if="tipo === 'despesa'">
                <optgroup label="Despesas">
                  {% for c in despesa_cats %}
                  <option value="{{ c.pk }}">{{ c }}</option>
                  {% endfor %}
                </optgroup>
              </template>
            </select>
          </div>
          <div>
            <label class="label">Conta bancaria <span class="text-red-500">*</span></label>
            <select name="conta" required class="input">
              <option value="">Selecione...</option>
              {% for c in contas %}
              <option value="{{ c.pk }}">{{ c.nome }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="label">Vencimento <span class="text-red-500">*</span></label>
            <input type="date" name="data_vencimento" required class="input">
          </div>
          <div>
            <label class="label">Competencia</label>
            <input type="date" name="data_competencia" class="input">
          </div>
          <div>
            <label class="label">Pagamento</label>
            <input type="date" name="data_pagamento" class="input">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Canal</label>
            <select name="canal" class="input">
              {% for v, l in canal_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Centro de custo</label>
            <select name="departamento" class="input">
              <option value="">Nenhum</option>
              {% for d in departamentos %}
              <option value="{{ d.pk }}">{{ d.nome }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div>
          <label class="label">Observacao</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
        <div>
          <label class="label">Comprovante</label>
          <input type="file" name="comprovante"
                 class="block w-full text-sm text-t2 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-bg4 file:text-t2 hover:file:bg-bdr2">
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar Lancamento</button>
        <a href="{% url 'web:fin-lancamentos' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
