{% extends "base.html" %}
{% block title %}Nova Cobrança{% endblock %}
{% block page_title %}Nova Cobrança{% endblock %}
{% block content %}
<div class="max-w-lg">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% if erros %}{% include "clientes/_form_errors.html" %}{% endif %}
      <div class="space-y-4 mt-2">
        <div>
          <label class="label">Cliente <span class="text-red-500">*</span></label>
          <select name="cliente" required class="input">
            <option value="">Selecione...</option>
            {% for c in clientes %}
            <option value="{{ c.pk }}">{{ c.nome }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label">Descrição <span class="text-red-500">*</span></label>
          <input type="text" name="descricao" required class="input" placeholder="Ex: Mensalidade Plano Premium — mar/2026">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Tipo</label>
            <select name="tipo" class="input">
              {% for v, l in tipo_choices %}
              <option value="{{ v }}">{{ l }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="label">Plano vinculado</label>
            <select name="plano" class="input">
              <option value="">Nenhum</option>
              {% for p in planos %}
              <option value="{{ p.pk }}">{{ p.nome }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="label">Valor (R$) <span class="text-red-500">*</span></label>
            <input type="number" step="0.01" name="valor" required class="input">
          </div>
          <div>
            <label class="label">Vencimento <span class="text-red-500">*</span></label>
            <input type="date" name="vencimento" required class="input">
          </div>
        </div>
        <div>
          <label class="label">Canal de cobrança</label>
          <select name="canal" class="input">
            {% for v, l in canal_choices %}
            <option value="{{ v }}">{{ l }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label">Observação</label>
          <textarea name="observacao" rows="2" class="input"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar</button>
        <a href="{% url 'web:fin-cobrancas' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
