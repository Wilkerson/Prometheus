{% load static %}
{% comment %}
Logo RUCH — imagem PNG com fundo transparente.
Parametros via with:
  logo_height: altura em px (default: 28)
  logo_class: classes CSS extras (optional)
{% endcomment %}
<img src="{% static 'img/logo.png' %}" alt="RUCH" height="{{ logo_height|default:'28' }}" class="{{ logo_class|default:'' }}" style="height: {{ logo_height|default:'28' }}px; width: auto;">
