{% extends "base.html" %}

{% block title %}{{ cliente.nome }}{% endblock %}
{% block page_title %}Cliente: {{ cliente.nome }}{% endblock %}

{% block page_actions %}
<div class="flex gap-2">
  {% if can_edit %}
  <a href="{% url 'web:cliente-edit' cliente.pk %}" class="btn-primary">Editar</a>
  {% endif %}
</div>
{% endblock %}

{% block content %}
<div id="cliente-detail-content">
  {% include "clientes/_detail_content.html" %}
</div>
{% endblock %}
