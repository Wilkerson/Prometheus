{% extends "base.html" %}

{% block title %}Novo Cliente{% endblock %}
{% block page_title %}Novo Cliente{% endblock %}

{% block page_actions %}
<a href="{% url 'web:clientes' %}" class="btn-secondary">Voltar</a>
{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="card">
    <form method="post" hx-post="{% url 'web:cliente-create' %}" hx-target="#form-result">
      {% csrf_token %}
      <div class="space-y-4">
        {% if leads %}
        <div>
          <label for="lead" class="label">Lead de origem (opcional)</label>
          <select name="lead" id="lead" class="input">
            <option value="">Sem lead vinculada</option>
            {% for lead in leads %}
            <option value="{{ lead.id }}">{{ lead.nome }} — {{ lead.parceiro.nome_entidade }}</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}
        <div>
          <label for="nome" class="label">Nome / Razao Social</label>
          <input type="text" name="nome" id="nome" required class="input" placeholder="Nome do cliente">
        </div>
        <div>
          <label for="cnpj" class="label">CNPJ</label>
          <input type="text" name="cnpj" id="cnpj" required class="input" placeholder="00.000.000/0000-00">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="email" class="label">Email</label>
            <input type="email" name="email" id="email" required class="input" placeholder="email@empresa.com">
          </div>
          <div>
            <label for="telefone" class="label">Telefone</label>
            <input type="text" name="telefone" id="telefone" class="input" placeholder="(11) 99999-9999">
          </div>
        </div>
        <div>
          <label for="endereco" class="label">Endereco</label>
          <input type="text" name="endereco" id="endereco" class="input" placeholder="Rua, numero, bairro, cidade - UF">
        </div>
        <div class="w-1/3">
          <label for="cep" class="label">CEP</label>
          <input type="text" name="cep" id="cep" class="input" placeholder="00000-000">
        </div>
      </div>

      <div id="form-result" class="mt-4"></div>

      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Cadastrar Cliente</button>
        <a href="{% url 'web:clientes' %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
