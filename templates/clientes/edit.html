{% extends "base.html" %}

{% block title %}Editar {{ cliente.nome }}{% endblock %}
{% block page_title %}Editar Cliente{% endblock %}

{% block page_actions %}
<a href="{% url 'web:cliente-detail' cliente.pk %}" class="btn-secondary">Voltar</a>
{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="card">
    <form method="post" hx-post="{% url 'web:cliente-edit' cliente.pk %}" hx-target="#form-result">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label for="nome" class="label">Nome / Razao Social</label>
          <input type="text" name="nome" id="nome" required class="input" value="{{ cliente.nome }}">
        </div>
        <div>
          <label for="cnpj" class="label">CNPJ</label>
          <input type="text" name="cnpj" id="cnpj" required class="input" value="{{ cliente.cnpj }}">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="email" class="label">Email</label>
            <input type="email" name="email" id="email" required class="input" value="{{ cliente.email }}">
          </div>
          <div>
            <label for="telefone" class="label">Telefone</label>
            <input type="text" name="telefone" id="telefone" class="input" value="{{ cliente.telefone }}">
          </div>
        </div>
        <div>
          <label for="endereco" class="label">Endereco</label>
          <input type="text" name="endereco" id="endereco" class="input" value="{{ cliente.endereco }}">
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="cep" class="label">CEP</label>
            <input type="text" name="cep" id="cep" class="input" value="{{ cliente.cep }}">
          </div>
          <div>
            <label class="label">Status</label>
            <label class="flex items-center gap-2 mt-2 cursor-pointer">
              <input type="checkbox" name="ativo" {% if cliente.ativo %}checked{% endif %}
                     class="w-4 h-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
              <span class="text-sm text-gray-700">Cliente ativo</span>
            </label>
          </div>
        </div>
      </div>

      <div id="form-result" class="mt-4"></div>

      <div class="flex gap-3 mt-6">
        <button type="submit" class="btn-primary">Salvar Alteracoes</button>
        <a href="{% url 'web:cliente-detail' cliente.pk %}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
